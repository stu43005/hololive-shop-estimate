apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: dify
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: dify
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: dify
    spec:
      containers:
        - name: web
          image: langgenius/dify-web:1.13.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: CONSOLE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: CONSOLE_API_URL
            - name: APP_API_URL
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: APP_API_URL
            - name: NEXT_PUBLIC_COOKIE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: NEXT_PUBLIC_COOKIE_DOMAIN
            - name: SENTRY_DSN
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEB_SENTRY_DSN
            - name: NEXT_TELEMETRY_DISABLED
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: NEXT_TELEMETRY_DISABLED
            - name: TEXT_GENERATION_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: TEXT_GENERATION_TIMEOUT_MS
            - name: CSP_WHITELIST
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: CSP_WHITELIST
            - name: ALLOW_EMBED
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: ALLOW_EMBED
            - name: ALLOW_UNSAFE_DATA_SCHEME
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: ALLOW_UNSAFE_DATA_SCHEME
            - name: MARKETPLACE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: MARKETPLACE_API_URL
            - name: MARKETPLACE_URL
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: MARKETPLACE_URL
            - name: TOP_K_MAX_VALUE
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: TOP_K_MAX_VALUE
            - name: INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH
            - name: PM2_INSTANCES
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PM2_INSTANCES
            - name: LOOP_NODE_MAX_COUNT
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: LOOP_NODE_MAX_COUNT
            - name: MAX_TOOLS_NUM
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: MAX_TOOLS_NUM
            - name: MAX_PARALLEL_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: MAX_PARALLEL_LIMIT
            - name: MAX_ITERATIONS_NUM
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: MAX_ITERATIONS_NUM
            - name: MAX_TREE_DEPTH
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: MAX_TREE_DEPTH
            - name: ENABLE_WEBSITE_JINAREADER
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: ENABLE_WEBSITE_JINAREADER
            - name: ENABLE_WEBSITE_FIRECRAWL
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: ENABLE_WEBSITE_FIRECRAWL
            - name: ENABLE_WEBSITE_WATERCRAWL
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: ENABLE_WEBSITE_WATERCRAWL
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: dify
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: dify
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: web
