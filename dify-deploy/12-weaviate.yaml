apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weaviate
  namespace: dify
  labels:
    app.kubernetes.io/name: weaviate
    app.kubernetes.io/part-of: dify
spec:
  serviceName: weaviate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: weaviate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weaviate
        app.kubernetes.io/part-of: dify
    spec:
      containers:
        - name: weaviate
          image: semitechnologies/weaviate:1.27.0
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50051
              name: grpc
          env:
            - name: PERSISTENCE_DATA_PATH
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_PERSISTENCE_DATA_PATH
            - name: QUERY_DEFAULTS_LIMIT
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_QUERY_DEFAULTS_LIMIT
            - name: AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED
            - name: DEFAULT_VECTORIZER_MODULE
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_DEFAULT_VECTORIZER_MODULE
            - name: CLUSTER_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_CLUSTER_HOSTNAME
            - name: AUTHENTICATION_APIKEY_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_AUTHENTICATION_APIKEY_ENABLED
            - name: AUTHENTICATION_APIKEY_ALLOWED_KEYS
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: WEAVIATE_AUTHENTICATION_APIKEY_ALLOWED_KEYS
            - name: AUTHENTICATION_APIKEY_USERS
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_AUTHENTICATION_APIKEY_USERS
            - name: AUTHORIZATION_ADMINLIST_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_AUTHORIZATION_ADMINLIST_ENABLED
            - name: AUTHORIZATION_ADMINLIST_USERS
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_AUTHORIZATION_ADMINLIST_USERS
            - name: DISABLE_TELEMETRY
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_DISABLE_TELEMETRY
            - name: ENABLE_TOKENIZER_GSE
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_ENABLE_TOKENIZER_GSE
            - name: ENABLE_TOKENIZER_KAGOME_JA
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_ENABLE_TOKENIZER_KAGOME_JA
            - name: ENABLE_TOKENIZER_KAGOME_KR
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: WEAVIATE_ENABLE_TOKENIZER_KAGOME_KR
          volumeMounts:
            - name: weaviate-data
              mountPath: /var/lib/weaviate
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "512Mi"
              cpu: "100m"
      volumes:
        - name: weaviate-data
          persistentVolumeClaim:
            claimName: weaviate-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: weaviate
  namespace: dify
  labels:
    app.kubernetes.io/name: weaviate
    app.kubernetes.io/part-of: dify
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
    - port: 50051
      targetPort: 50051
      name: grpc
  selector:
    app.kubernetes.io/name: weaviate
