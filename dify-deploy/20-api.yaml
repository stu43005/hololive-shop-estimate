apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dify
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: dify
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: dify
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - api
                      - worker
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: init-permissions
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              chown -R 1001:1001 /app/api/storage || true
          volumeMounts:
            - name: dify-storage
              mountPath: /app/api/storage
      containers:
        - name: api
          image: langgenius/dify-api:1.13.0
          ports:
            - containerPort: 5001
              name: http
          envFrom:
            - configMapRef:
                name: dify-shared-config
          env:
            - name: MODE
              value: "api"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: SECRET_KEY
            - name: INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: INIT_PASSWORD
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: REDIS_PASSWORD
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: CELERY_BROKER_URL
            - name: WEAVIATE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: WEAVIATE_API_KEY
            - name: CODE_EXECUTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: CODE_EXECUTION_API_KEY
            - name: PLUGIN_REMOTE_INSTALL_HOST
              value: "localhost"
            - name: PLUGIN_REMOTE_INSTALL_PORT
              value: "5003"
            - name: INNER_API_KEY_FOR_PLUGIN
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: PLUGIN_DIFY_INNER_API_KEY
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: RESEND_API_KEY
            - name: PLUGIN_DAEMON_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: PLUGIN_DAEMON_KEY
          volumeMounts:
            - name: dify-storage
              mountPath: /app/api/storage
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "384Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: dify-storage
          persistentVolumeClaim:
            claimName: dify-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dify
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: dify
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
      name: http
  selector:
    app.kubernetes.io/name: api
