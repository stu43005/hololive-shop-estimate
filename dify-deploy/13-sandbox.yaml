apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-config
  namespace: dify
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/part-of: dify
data:
  config.yaml: |
    app:
      port: 8194
      debug: false
      key: dify-sandbox
    max_workers: 4
    max_requests: 50
    worker_timeout: 15
    python_path: /usr/local/bin/python3
    enable_network: true
    allowed_syscalls:
    proxy:
      socks5: ''
      http: ''
      https: ''
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox
  namespace: dify
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/part-of: dify
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox
        app.kubernetes.io/part-of: dify
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - sandbox
              topologyKey: kubernetes.io/hostname
      containers:
        - name: sandbox
          image: langgenius/dify-sandbox:0.2.12
          ports:
            - containerPort: 8194
              name: http
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: SANDBOX_API_KEY
            - name: GIN_MODE
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: SANDBOX_GIN_MODE
            - name: WORKER_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: SANDBOX_WORKER_TIMEOUT
            - name: ENABLE_NETWORK
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: SANDBOX_ENABLE_NETWORK
            - name: HTTP_PROXY
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: SANDBOX_HTTP_PROXY
            - name: HTTPS_PROXY
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: SANDBOX_HTTPS_PROXY
            - name: SANDBOX_PORT
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: SANDBOX_PORT
            - name: PIP_MIRROR_URL
              valueFrom:
                configMapKeyRef:
                  name: dify-shared-config
                  key: PIP_MIRROR_URL
          volumeMounts:
            - name: sandbox-data
              mountPath: /dependencies
              subPath: dependencies
            - name: sandbox-config
              mountPath: /conf/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /health
              port: 8194
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8194
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "1000m"
      volumes:
        - name: sandbox-data
          persistentVolumeClaim:
            claimName: sandbox-data-pvc
        - name: sandbox-config
          configMap:
            name: sandbox-config
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox
  namespace: dify
  labels:
    app.kubernetes.io/name: sandbox
    app.kubernetes.io/part-of: dify
spec:
  type: ClusterIP
  ports:
    - port: 8194
      targetPort: 8194
      name: http
  selector:
    app.kubernetes.io/name: sandbox
