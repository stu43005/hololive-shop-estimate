apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: dify
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: dify
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: dify
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - api
                      - worker
              topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: langgenius/dify-api:1.13.0
          envFrom:
            - configMapRef:
                name: dify-shared-config
          env:
            - name: MODE
              value: "worker"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: REDIS_PASSWORD
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: CELERY_BROKER_URL
            - name: WEAVIATE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: WEAVIATE_API_KEY
            - name: CODE_EXECUTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: CODE_EXECUTION_API_KEY
            - name: INNER_API_KEY_FOR_PLUGIN
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: PLUGIN_DIFY_INNER_API_KEY
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: RESEND_API_KEY
            - name: PLUGIN_DAEMON_KEY
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: PLUGIN_DAEMON_KEY
          volumeMounts:
            - name: dify-storage
              mountPath: /app/api/storage
          resources:
            requests:
              memory: "384Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: dify-storage
          persistentVolumeClaim:
            claimName: dify-storage-pvc
