apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dify-storage-pvc
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/part-of: dify
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
