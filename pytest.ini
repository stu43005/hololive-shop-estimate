[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=estimator_king --cov-report=term-missing
markers =
    waf: marks tests related to WAF failure simulation (429 Retry-After, 403/430 bot rejection, timeouts, circuit breaker)
