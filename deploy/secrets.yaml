apiVersion: v1
kind: Secret
metadata:
  name: estimator-king-secrets
  namespace: dify
  labels:
    app.kubernetes.io/name: estimator-king
type: Opaque
stringData:
  # Dify Dataset API Key (for crawler KB sync)
  # Generate with: echo -n "dataset-abc123..." | base64
  DIFY_API_KEY: "REPLACE_ME"

  # Dify Dataset ID (UUID without prefix)
  DIFY_DATASET_ID: "REPLACE_ME"

  # Discord Bot Token
  DISCORD_TOKEN: "REPLACE_ME"

  # Dify Workflow API Key (for bot workflow calls)
  DIFY_WORKFLOW_API_KEY: "REPLACE_ME"
