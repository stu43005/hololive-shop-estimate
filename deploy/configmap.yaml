apiVersion: v1
kind: ConfigMap
metadata:
  name: estimator-king-config
  namespace: dify
  labels:
    app.kubernetes.io/name: estimator-king
data:
  CRAWLER_LOG_LEVEL: "INFO"
  CHROMA_PATH: "/data/chroma"

  # Override the following when using a custom OpenAI-compatible endpoint (e.g. ollama):
  # OPENAI_BASE_URL: "http://ollama:11434/v1"
  # EMBEDDING_MODEL: "nomic-embed-text"
  # EMBEDDING_DIMENSIONS: "768"
  # CHAT_MODEL: "llama3"

  # stores_config.yaml is mounted from a separate ConfigMap created from file.
  # Ops reference command:
  # kubectl create configmap estimator-king-stores-config \
  #   --from-file=stores_config.yaml=./stores_config.yaml \
  #   --namespace=dify \
  #   --dry-run=client -o yaml | kubectl apply -f -
