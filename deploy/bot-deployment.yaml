apiVersion: apps/v1
kind: Deployment
metadata:
  name: estimator-king-bot
  namespace: dify
  labels:
    app.kubernetes.io/name: estimator-king-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: estimator-king-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: estimator-king-bot
    spec:
      containers:
        - name: bot
          image: estimator-king-bot:latest
          args:
            - run
            - --token
            - $(DISCORD_TOKEN)
            - --config
            - /config/stores_config.yaml
          envFrom:
            - configMapRef:
                name: estimator-king-config
          env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: estimator-king-secrets
                  key: DISCORD_TOKEN
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: estimator-king-secrets
                  key: OPENAI_API_KEY
            - name: DATABASE_PATH
              value: "/data/estimator_king.db"
            - name: CHROMA_PATH
              value: "/data/chroma"
          volumeMounts:
            - name: state-storage
              mountPath: /data
            - name: stores-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: state-storage
          persistentVolumeClaim:
            claimName: estimator-king-state-pvc
        - name: stores-config
          configMap:
            name: estimator-king-stores-config
