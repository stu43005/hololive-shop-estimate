# Estimator King - Store Configuration
# Define stores, crawl policies, and optional proxy settings

stores:
  - id: hololive
    base_url: https://shop.hololivepro.com
    sitemap_url: https://shop.hololivepro.com/sitemap.xml
    # 只抓預設語系（無語系前綴）；排除 /en/ 等所有語系版本
    locale: default

  - id: vspo
    base_url: https://store.vspo.jp
    sitemap_url: https://store.vspo.jp/sitemap.xml
    # 只抓預設日文（無語系前綴）；排除 /en/、/en-al/、/ja-al/ 等所有語系版本
    locale: default

crawler:
  # Rate limiting (requests per second)
  rate_limit_rps: 1.5
  
  # Random jitter to add to delay (0 to jitter_max seconds)
  jitter_max: 0.5
  
  # Concurrent requests per domain
  concurrency_per_domain: 3
  
  # Connection timeout (seconds)
  timeout_connect: 10
  
  # Read timeout (seconds)
  timeout_read: 30
  
  # Maximum retry attempts for failed requests
  max_retries: 3

  # Per-store fetch budget per scheduled run: new products are always fetched,
  # and the remainder of the budget is spent on the oldest existing products
  max_products_per_run: 32

  # How often the in-process scheduler runs a full crawl cycle (hours)
  crawl_schedule_hours: 24.0

  # Number of consecutive failures before marking store inactive
  inactive_failure_threshold: 3

  # Number of consecutive sitemap misses before marking store inactive
  inactive_sitemap_miss_threshold: 4

proxy:
  # Enable/disable proxy support
  enabled: false

  # HTTP proxy (populated from environment if enabled)
  # Uses HTTP_PROXY env var, falls back to empty string
  http_proxy: ""

  # HTTPS proxy (populated from environment if enabled)
  # Uses HTTPS_PROXY env var, falls back to empty string
  https_proxy: ""

item_types:
  - タペストリー
  - アクリルスタンド
  - アクリルキーホルダー
  - 缶バッジ
  - ぬいぐるみ
  - キーホルダー
  - ネックレス
  - ポーチ
  - ボイス
  - Tシャツ
  - タオル
item_types_version: 1

talents:
  - 博衣こより
  - 白銀ノエル
  - 尾丸ポルカ

estimator:
  top_k: 10
  recency_weight: 0.05
